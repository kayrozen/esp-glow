# Provisioning editor + web flasher + docs site — build WASM, generate +
# drift-check the docs, deploy both as one static site to GitHub Pages.
#
# Jobs:
#   1. build-wasm: installs emsdk, compiles provision.cpp + wasm-glue.cpp
#      to provision-wasm.{js,wasm}, runs the 14 C++ tests under Node to
#      verify the WASM build matches the host build, uploads the artifacts.
#   2. build-docs: extracts the real glow.* API names + text-format grammar
#      keywords from source (glow_lua_api.cpp, provision.cpp) via
#      docs/build/gen-reference.mjs, fails the build if docs/generated/
#      glow-api-names.json doesn't match a fresh extraction, and fails the
#      build if the hand-written docs/reference.md / docs/grammar.md don't
#      document exactly that set (the anti-drift guard, now enforced as
#      completeness rather than generated prose -- see
#      docs/build/gen-reference.mjs's own header) -- also runs the
#      checker's own unit tests.
#   3. deploy-pages: needs both of the above. Downloads the WASM +
#      firmware artifacts, assembles the static editor bundle
#      (web/provisioner-static/), renders the docs site into its `docs/`
#      subdirectory, and deploys the whole tree to GitHub Pages as one
#      artifact.
#
# The editor and the docs site are both plain HTML/JS/CSS — no build
# step beyond the docs generator/renderer, no framework. The WASM +
# firmware artifacts are copied alongside it. The whole thing is served
# as static files.
#
# Trigger: any push or pull request touching web/provision-wasm/**,
# web/provisioner-static/**, provision.cpp, provision.h, fixture_profile.*,
# profile_encoder.*, show_bundle.*, test_provision.cpp, docs/**,
# glow_lua_api.{cpp,h}, live_control.h, pixel_patterns.*,
# samples/demo-boot.fnl, Makefile, or the workflow itself -- build-wasm and
# build-docs both run (and must pass) on every branch/PR, not just main, so
# a WASM regression or a `glow.*`/grammar change without a matching update
# to docs/reference.md / docs/grammar.md is caught before merge instead of
# after (this used to be
# push-to-main-only for build-wasm, so a break could merge cleanly and only
# surface once it hit main). deploy-pages still only fires for an actual
# push to main (or the Firmware build workflow finishing on main, or manual
# dispatch) -- see its own `if:` below.

name: Build & deploy provisioner

on:
  push:
    paths:
      - "web/provision-wasm/**"
      - "web/provisioner-static/**"
      - "web/shared/**"
      - "web/vendor/**"
      - "web/littlefs-image/**"
      - "provision.cpp"
      - "provision.h"
      - "fixture_profile.*"
      - "profile_encoder.*"
      - "mdef.*"
      - "controller_encoder.*"
      - "show_bundle.*"
      - "vec_math.*"
      - "test_provision.cpp"
      - "docs/**"
      - "glow_lua_api.cpp"
      - "glow_lua_api.h"
      - "live_control.h"
      - "pixel_patterns.cpp"
      - "pixel_patterns.h"
      - "samples/demo-boot.fnl"
      - "Makefile"
      - ".github/workflows/provisioner.yml"
  pull_request:
    paths:
      - "web/provision-wasm/**"
      - "web/provisioner-static/**"
      - "web/shared/**"
      - "web/vendor/**"
      - "web/littlefs-image/**"
      - "provision.cpp"
      - "provision.h"
      - "fixture_profile.*"
      - "profile_encoder.*"
      - "mdef.*"
      - "controller_encoder.*"
      - "show_bundle.*"
      - "vec_math.*"
      - "test_provision.cpp"
      - "docs/**"
      - "glow_lua_api.cpp"
      - "glow_lua_api.h"
      - "live_control.h"
      - "pixel_patterns.cpp"
      - "pixel_patterns.h"
      - "samples/demo-boot.fnl"
      - "Makefile"
      - ".github/workflows/provisioner.yml"
  workflow_run:
    workflows: ["Firmware build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read    # dawidd6/action-download-artifact: fetch firmware-esp32s3 from another workflow's run
  pages: write
  id-token: write

# Scope concurrency per ref so unrelated branches/PRs don't cancel each
# other's build-wasm CI job. A single static group (the old
# "provisioner-pages") plus cancel-in-progress meant any newly-started run
# canceled every other in-progress run of this workflow -- so two open PRs
# building at once would cancel each other's "Build WASM + run tests" check
# (seen as "Canceling since a higher priority waiting request ... exists").
# Per-ref grouping still collapses redundant runs on the SAME ref, but only
# for non-main refs: on main we never cancel in-progress so a Pages deploy
# already underway is allowed to finish (newer main runs queue instead).
# Deploys are additionally serialized globally by the deploy-pages job's own
# concurrency group below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-wasm:
    name: Build WASM + run tests
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Verify emcc
        run: emcc --version | head -2

      - name: Build + run WASM tests (14 C++ tests under Node)
        run: bash web/provision-wasm/build-wasm.sh test

      - name: Build editor WASM
        run: bash web/provision-wasm/build-wasm.sh editor

      - name: Run editor smoke tests
        run: node web/provision-wasm/smoke-test-wasm.mjs

      - name: Build fdef_check (host g++, not emcc -- round-trip oracle for the importers)
        run: make fdef_check

      - name: Run fixture importer tests (QLC+/OFL/GDTF -- web/shared/importers/)
        run: node web/shared/importers/test-importers.mjs

      - name: Build devcfg_check (host g++ -- round-trip oracle for the CFG1 JS encoder)
        run: make devcfg_check

      - name: Run CFG1 device-config encoder/decoder tests (web/shared/devcfg.js)
        run: node web/shared/test-devcfg.mjs

      - name: Run web console + ws-client tests (P1.3 -- app.js, ws-client.js)
        run: |
          node scripts/test-ws-client.mjs
          node web/console/test-reconcile.mjs

      - name: Run project workspace tests (multi-show data model, storage, zip export/import, device sync)
        run: |
          node web/shared/test-project-model.mjs
          node web/shared/test-project-store.mjs
          node web/shared/test-project-zip.mjs
          node web/shared/test-device-sync.mjs

      - name: Install Playwright + Chromium (oracle browser for the fennel-check test below)
        run: |
          # fennel-check.js runs the vendored wasmoon (WASM Lua) bundle, which is
          # built for a real browser JS environment only -- it does not run under
          # plain Node. --no-save so this doesn't create/modify a repo package.json;
          # node_modules/ here is CI-run-local and never committed.
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Run fennel-check.js browser compile-check tests (glow.* accept-everything proxy)
        run: node web/provisioner-static/test-fennel-check.mjs

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provision-wasm
          path: |
            web/provision-wasm/provision-wasm.js
            web/provision-wasm/provision-wasm.wasm
          if-no-files-found: error
          retention-days: 7

  build-docs:
    name: Check docs completeness
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run the checker's unit tests (regex extraction + completeness diff, against fixtures)
        run: node docs/build/gen-reference.test.mjs

      - name: Drift guard -- fail if docs/generated/glow-api-names.json doesn't match a fresh extraction,
              or if docs/reference.md / docs/grammar.md don't cover exactly the real glow.* API / grammar
        run: |
          # Two failure modes, both fatal: (1) glow-api-names.json stale --
          # --check compares a fresh extraction against the committed file
          # in-memory (writes nothing); (2) the hand-written docs/reference.md
          # or docs/grammar.md documents a glow.* name / grammar keyword that
          # doesn't exist in source, or is missing one that does -- see
          # docs/build/gen-reference.mjs's own header for why this replaced
          # generating the prose itself.
          node docs/build/gen-reference.mjs --check

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [build-wasm, build-docs]
    # build-wasm now runs on every push/PR so a WASM regression is caught
    # before merge, but only an actual push to main (or the Firmware build
    # workflow finishing on main, or a manual dispatch) should publish --
    # never a pull_request event or a push to some other branch.
    if: github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    # Serialize actual Pages deployments globally (across push-to-main,
    # workflow_run, and workflow_dispatch), independent of the per-ref
    # workflow concurrency above. cancel-in-progress: false so an in-flight
    # deployment is never aborted -- overlapping deploys queue behind it.
    concurrency:
      group: provisioner-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: provision-wasm
          path: web/provisioner-static/wasm/

      - name: Download latest firmware artifacts (for the web flasher)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: firmware.yml
          branch: main
          name: firmware-esp32s3
          path: web/provisioner-static/firmware/
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Copy shared assets (CodeMirror/parinfer/wasmoon/littlefs-image bundles)
        run: |
          # web/shared/ (the CodeMirror+parinfer editor component) and
          # web/vendor/ (its bundled dependencies, plus wasmoon + the
          # littlefs-image WASM module for boot.fnl authoring/compile-check/
          # bake-in) are shared with the device console (embedded on-device
          # instead), so they live as siblings of web/provisioner-static/ in
          # the repo, not inside it. Pages only publishes the upload-pages-
          # artifact path below, so copy them in before that upload -- same
          # reasoning as the wasm/ and firmware/ downloads above.
          cp -r web/shared web/provisioner-static/shared
          cp -r web/vendor web/provisioner-static/vendor
          test -f web/provisioner-static/shared/fennel-editor.js
          test -f web/provisioner-static/vendor/editor-bundle.mjs
          test -f web/provisioner-static/vendor/wasmoon-bundle.mjs
          test -f web/provisioner-static/vendor/fennel.lua
          test -f web/provisioner-static/vendor/littlefs-image.wasm

      - name: Render docs site into web/provisioner-static/docs/
        run: |
          # build-docs already proved docs/reference.md and docs/grammar.md
          # cover exactly the real glow.* API and text-format grammar --
          # this just renders the hand-written Markdown (docs/*.md) to
          # static HTML. One deploy, two artifacts, alongside the
          # provisioner above.
          node docs/build/render-site.mjs --out web/provisioner-static/docs
          test -f web/provisioner-static/docs/index.html

      - name: Build static site
        run: |
          # The static site is web/provisioner-static/ — plain HTML/JS/CSS,
          # plus the WASM artifacts we just downloaded into wasm/ and the
          # firmware binaries downloaded into firmware/. No build step; just
          # verify the structure.
          ls -la web/provisioner-static/
          ls -la web/provisioner-static/wasm/
          test -f web/provisioner-static/index.html
          test -f web/provisioner-static/wasm/provision-wasm.js
          test -f web/provisioner-static/wasm/provision-wasm.wasm
          if [ -d web/provisioner-static/firmware ]; then
            echo "firmware artifacts:"
            find web/provisioner-static/firmware -maxdepth 3 -type f
          else
            echo "::warning::no firmware artifacts found; the web flasher's Flash step will be unavailable on this deploy."
          fi

      - name: Verify no relative import/fetch/src/href escapes the site root
        run: |
          # web/provisioner-static/ becomes the *root* of the deployed site
          # (kayrozen.github.io/esp-glow/), with shared/, vendor/, and now
          # docs/ living under it. A relative reference with enough "../" to walk
          # above this root resolves off the actual site and 404s on Pages
          # -- even though it can happen to work in local dev, and even
          # though a file nested under docs/ legitimately NEEDS "../../" to
          # reach shared/vendor at the root (a blanket "no .. allowed" rule
          # would reject that valid code, which is why this is a depth-aware
          # check -- see docs/build/check-relative-paths.mjs -- not the
          # top-level-only grep this replaced).
          node docs/build/check-relative-paths.mjs web/provisioner-static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/provisioner-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
