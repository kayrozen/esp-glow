name: QEMU boot test
on:
  push:
  pull_request:
jobs:
  qemu-boot:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.1
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP Component Manager packages
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: ${{ runner.os }}-esp-components-${{ hashFiles('firmware/main/idf_component.yml') }}
          restore-keys: |
            ${{ runner.os }}-esp-components-

      - name: Build the show bundle (raw "show" partition input)
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror -O2 \
              provision_main.cpp provision.cpp profile_encoder.cpp controller_encoder.cpp \
              fixture_profile.cpp mdef.cpp pixel_matrix.cpp color.cpp vec_math.cpp \
              aim.cpp show_bundle.cpp -o /tmp/provision -lm
          mkdir -p firmware/main/data
          /tmp/provision samples/demo.show firmware/main/data/show.shw1

      # A CONFIG_GLOW_SELFTEST=y build, same layered sdkconfig
      # tests/hil/conftest.py flashes to real hardware -- NOT the plain
      # release build the "Firmware build" workflow produces, which never
      # prints the GLOW-TEST: telemetry this suite asserts on.
      - name: Build selftest firmware (CONFIG_GLOW_SELFTEST=y)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C firmware -B firmware/build-qemu-selftest \
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.selftest.defaults" \
            build

      # Prebuilt Espressif QEMU (xtensa, ESP32-S3 machine support). This
      # release's URL/checksum come straight from a current ESP-IDF's
      # tools/tools.json "qemu-xtensa" entry -- v5.1 (pinned above for the
      # firmware build itself) predates idf.py's own qemu integration, so
      # this is installed independently rather than via `idf_tools.py
      # install qemu-xtensa`. See tests/qemu/README.md for the from-source
      # alternative if this release is ever pulled.
      - name: Install Espressif QEMU (xtensa)
        run: |
          QEMU_URL="https://github.com/espressif/qemu/releases/download/esp-develop-9.2.2-20250817/qemu-xtensa-softmmu-esp_develop_9.2.2_20250817-x86_64-linux-gnu.tar.xz"
          QEMU_SHA256="588bfaccd0f929650655d10a580f020c6ba9c131712d8fa519280081b8d126eb"
          curl -fL -o /tmp/qemu-xtensa.tar.xz "$QEMU_URL"
          echo "${QEMU_SHA256}  /tmp/qemu-xtensa.tar.xz" | sha256sum -c -
          mkdir -p /opt/qemu-xtensa
          tar -xJf /tmp/qemu-xtensa.tar.xz -C /opt/qemu-xtensa
          dirname "$(find /opt/qemu-xtensa -name qemu-system-xtensa -type f | head -1)" >> "$GITHUB_PATH"

          # This prebuilt binary dynamically links against SDL2 (its
          # optional display backend, unused with -nographic, but still
          # required at dynamic-link time) plus the usual glib/pixman/
          # slirp/gcrypt runtime libs -- none of which espressif/idf's
          # docker image ships, since it's a toolchain image, not a QEMU
          # one. `ldd` after install turns any future missing dependency
          # into a clear log line instead of a bare "exit code 127".
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libglib2.0-0 libpixman-1-0 libslirp0 libgcrypt20
          QEMU_BIN="$(find /opt/qemu-xtensa -name qemu-system-xtensa -type f | head -1)"
          ldd "$QEMU_BIN" | grep "not found" && exit 1 || true

      # TEMPORARY diagnostic: boot hangs somewhere after "GLOW-TEST: dmx
      # begin=ok" (Art-Net/bundle/scripts/stats telemetry all time out).
      # wifi_start_sta() runs immediately after DMX in app_main() and is
      # the leading suspect (QEMU's esp32s3 machine has no WiFi/802.11
      # model, only a wired "open_eth" NIC -- see hw/xtensa/esp32s3.c), but
      # this project has a history of confident wrong diagnoses, so: attach
      # gdb to the actually-running QEMU process and get a real backtrace
      # instead of acting on that guess. Remove this step once the real
      # cause is confirmed and fixed.
      - name: Diagnose the boot hang with gdb
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          GDB_BIN="$(find /opt/esp/tools -type f -name '*-elf-gdb' | head -1)"
          echo "Using gdb: $GDB_BIN"
          ELF="firmware/build-qemu-selftest/esp-glow.elf"
          FLASH="firmware/build-qemu-selftest/qemu_flash.bin"

          qemu-system-xtensa -nographic -no-reboot -machine esp32s3 \
            -drive file="$FLASH",if=mtd,format=raw -m 8M \
            -global driver=ssi_psram,property=is_octal,value=true \
            -gdb tcp::1234 > /tmp/qemu_serial.log 2>&1 &
          QEMU_PID=$!

          # Give it time to pass DMX init and reach (what we believe is)
          # the hang -- test timeouts showed no forward progress for 20-30s,
          # so 15s here should land solidly inside the stall, not before it.
          sleep 15

          "$GDB_BIN" -batch -nx \
            -ex "set pagination off" \
            -ex "target remote :1234" \
            -ex "echo \n=== info threads ===\n" \
            -ex "info threads" \
            -ex "echo \n=== thread apply all bt full ===\n" \
            -ex "thread apply all bt full" \
            -ex "echo \n=== thread apply all info registers ===\n" \
            -ex "thread apply all info registers" \
            "$ELF" 2>&1 || echo "gdb attach/backtrace failed (see above)"

          kill "$QEMU_PID" 2>/dev/null || true
          wait "$QEMU_PID" 2>/dev/null || true
          echo "=== QEMU serial output captured before/during the hang ==="
          cat /tmp/qemu_serial.log

      - name: Run QEMU boot tests
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          qemu-system-xtensa --version
          pip install -r tests/qemu/requirements.txt
          cd tests/qemu
          GLOW_SKIP_BUILD=1 pytest -v --tb=short

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qemu-boot-log
          path: tests/qemu/qemu_test.log
          if-no-files-found: ignore
