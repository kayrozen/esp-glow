name: QEMU boot test
on:
  push:
  pull_request:
jobs:
  qemu-boot:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.1
    steps:
      - uses: actions/checkout@v4

      # Invariant guard: core 1 (APP_CPU) runs the render/DMX task and NOTHING
      # else. Every FreeRTOS task must be created with xTaskCreatePinnedToCore
      # so its core is explicit and reviewable. A bare xTaskCreate() creates a
      # tskNO_AFFINITY task that can be scheduled onto core 1, where it either
      # steals cycles from the 44 Hz render loop or -- as actually happened --
      # triggers a cross-core flash-cache-disable stall that hangs boot (see
      # firmware/main/main.cpp's otadata-mmap ordering note). This fails CI on
      # any bare `xTaskCreate(` in tracked sources; xTaskCreatePinnedToCore(
      # is a different token and passes. If you ever genuinely want a
      # runtime-chosen core, call xTaskCreatePinnedToCore(..., tskNO_AFFINITY)
      # explicitly so the intent is visible in review.
      - name: Guard - no bare xTaskCreate (core 1 = render only)
        shell: bash
        run: |
          hits="$(git ls-files '*.cpp' '*.c' '*.h' '*.hpp' \
                    | grep -vE '^third_party/|(^|/)tests/' \
                    | xargs grep -nE 'xTaskCreate\(' || true)"
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::bare xTaskCreate( found -- use xTaskCreatePinnedToCore(..., core). Core 1 is render/DMX only."
            exit 1
          fi
          echo "OK: no bare xTaskCreate( in tracked sources."

      - name: Cache ESP Component Manager packages
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: ${{ runner.os }}-esp-components-${{ hashFiles('firmware/main/idf_component.yml') }}
          restore-keys: |
            ${{ runner.os }}-esp-components-

      - name: Build the show bundle (raw "show" partition input)
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror -O2 \
              provision_main.cpp provision.cpp profile_encoder.cpp controller_encoder.cpp \
              fixture_profile.cpp mdef.cpp pixel_matrix.cpp color.cpp vec_math.cpp \
              aim.cpp show_bundle.cpp -o /tmp/provision -lm
          mkdir -p firmware/main/data
          /tmp/provision samples/demo.show firmware/main/data/show.shw1

      # A CONFIG_GLOW_SELFTEST=y build, same layered sdkconfig
      # tests/hil/conftest.py flashes to real hardware -- NOT the plain
      # release build the "Firmware build" workflow produces, which never
      # prints the GLOW-TEST: telemetry this suite asserts on. Also layers
      # sdkconfig.qemu.defaults' CONFIG_GLOW_SKIP_WIFI=y: this QEMU fork has
      # no WiFi/802.11 hardware model, and without this flag app_main()
      # hangs in esp_wifi_init()'s RF calibration step before DMX/Lua/the
      # render task ever come up (see sdkconfig.qemu.defaults' comment and
      # tests/qemu/README.md).
      - name: Build selftest firmware (CONFIG_GLOW_SELFTEST=y)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C firmware -B firmware/build-qemu-selftest \
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.selftest.defaults;sdkconfig.qemu.defaults" \
            build

      # Prebuilt Espressif QEMU (xtensa, ESP32-S3 machine support). This
      # release's URL/checksum come straight from a current ESP-IDF's
      # tools/tools.json "qemu-xtensa" entry -- v5.1 (pinned above for the
      # firmware build itself) predates idf.py's own qemu integration, so
      # this is installed independently rather than via `idf_tools.py
      # install qemu-xtensa`. See tests/qemu/README.md for the from-source
      # alternative if this release is ever pulled.
      - name: Install Espressif QEMU (xtensa)
        run: |
          QEMU_URL="https://github.com/espressif/qemu/releases/download/esp-develop-9.2.2-20250817/qemu-xtensa-softmmu-esp_develop_9.2.2_20250817-x86_64-linux-gnu.tar.xz"
          QEMU_SHA256="588bfaccd0f929650655d10a580f020c6ba9c131712d8fa519280081b8d126eb"
          curl -fL -o /tmp/qemu-xtensa.tar.xz "$QEMU_URL"
          echo "${QEMU_SHA256}  /tmp/qemu-xtensa.tar.xz" | sha256sum -c -
          mkdir -p /opt/qemu-xtensa
          tar -xJf /tmp/qemu-xtensa.tar.xz -C /opt/qemu-xtensa
          dirname "$(find /opt/qemu-xtensa -name qemu-system-xtensa -type f | head -1)" >> "$GITHUB_PATH"

          # This prebuilt binary dynamically links against SDL2 (its
          # optional display backend, unused with -nographic, but still
          # required at dynamic-link time) plus the usual glib/pixman/
          # slirp/gcrypt runtime libs -- none of which espressif/idf's
          # docker image ships, since it's a toolchain image, not a QEMU
          # one. `ldd` after install turns any future missing dependency
          # into a clear log line instead of a bare "exit code 127".
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libglib2.0-0 libpixman-1-0 libslirp0 libgcrypt20
          QEMU_BIN="$(find /opt/qemu-xtensa -name qemu-system-xtensa -type f | head -1)"
          ldd "$QEMU_BIN" | grep "not found" && exit 1 || true

      - name: Run QEMU boot tests
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          qemu-system-xtensa --version
          pip install -r tests/qemu/requirements.txt
          cd tests/qemu
          # Loop the boot POST suite 5x rather than running it once. This is
          # a permanent anti-flake guard, NOT temporary scaffolding -- do not
          # "simplify" it back to a single run. Rationale: this job once hid a
          # real cross-core flash-cache boot stall that reproduced ~33% of the
          # time, i.e. a single-run CI would have gone green two times out of
          # three and shipped it (fixed by ordering the otadata mmap into the
          # single-task boot window -- see firmware/main/main.cpp). A 5x loop
          # drops the odds that a regression of that class slips through from
          # ~67% to ~13% per run. The cost is ~seconds (each QEMU boot is
          # ~0.5s wall). See tests/qemu/README.md and the boot-stall history.
          : > /tmp/pytest_output.log
          fail=0
          for i in $(seq 1 5); do
            echo "==================== BOOT ATTEMPT $i ===================="
            GLOW_SKIP_BUILD=1 pytest -v --tb=short test_l0_boot.py::TestQemuBootPOST 2>&1 | tee -a /tmp/pytest_output.log || fail=1
          done
          exit $fail

      # A crash (panic backtrace, "assert failed: 0x...") only ever shows up
      # in this suite's assertion messages as raw, unsymbolicated addresses
      # -- ESP32 firmware panic output isn't decoded until something runs it
      # through addr2line against the matching ELF (idf.py monitor normally
      # does this live over serial; there is no serial here). Decode every
      # 0x-prefixed address in this run's output against the ELF this same
      # job just built, so a future crash's actual file:line/function shows
      # up in the CI log directly instead of requiring a live gdb attach
      # (which already proved unreliable once in this suite's development --
      # see git history) or manual addr2line by hand.
      - name: Decode any crash addresses (addr2line)
        if: always()
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          ELF="firmware/build-qemu-selftest/esp-glow.elf"
          ADDR2LINE="$(find /opt/esp/tools -type f -name 'xtensa-esp32s3-elf-addr2line' | head -1)"
          # grep exits 1 on "no matches" (the good case: no crash, no
          # addresses to decode) -- under this step's default `set -e
          # -o pipefail`, that would otherwise kill the step and mark a
          # fully green test run as failed. `|| true` makes "nothing to
          # decode" a normal outcome instead of an error.
          ADDRS="$(grep -oE '0x[0-9a-fA-F]{8}' /tmp/pytest_output.log | sort -u || true)"
          if [ -z "$ADDR2LINE" ]; then
            echo "xtensa-esp32s3-elf-addr2line not found on PATH; skipping decode."
          elif [ -z "$ADDRS" ]; then
            echo "No 0x-addresses found in this run's output; nothing to decode."
          else
            echo "=== Decoded addresses (addr2line -e $ELF -fipC) ==="
            echo "$ADDRS" | "$ADDR2LINE" -e "$ELF" -fipC
            echo "(Not every address above is code -- register-dump values and"
            echo "other hex fields get swept up too; '?? ??:0' for those is expected.)"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qemu-boot-log
          path: tests/qemu/qemu_test.log
          if-no-files-found: ignore
