[pytest]
# QEMU Boot Test Configuration

markers =
    l0: Layer 0 - Boot/POST under QEMU (fully automated, no hardware)

# Individual test timeout (seconds). Generous relative to a real board's
# tests/hil/pytest.ini (60s) since a slow CI runner's first QEMU boot can
# be slower than a real board's ROM bootloader.
timeout = 90

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

log_cli = false
log_cli_level = INFO
log_file = qemu_test.log
log_file_level = DEBUG
