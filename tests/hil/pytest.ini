[pytest]
# HIL Test Configuration

# Markers for test organization
markers =
    l0: Layer 0 - Boot/POST tests (fully automated)
    l1: Layer 1 - DMX output tests (automated or semi-automated)
    l2: Layer 2 - Art-Net output tests (fully automated)
    l3: Layer 3 - Show load tests (fully automated)
    l4: Layer 4 - Input (Web/OSC/MIDI) tests (automated or semi-automated)
    l5: Layer 5 - Soak/concurrency tests (fully automated stress test)
    l6: Layer 6 - OTA and robustness tests (automated)
    hardware_dependent: Test requires specific hardware (DMX loopback, MIDI input, etc.)
    slow: Test takes significant time (soak tests, OTA tests)

# Timeout for individual tests (seconds)
# L5 soak test can take 10+ minutes, so be generous
timeout = 60

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Logging
log_cli = false
log_cli_level = INFO
log_file = hil_test.log
log_file_level = DEBUG
