[pytest]
# HIL Test Configuration

# Markers for test organization. Run order (see the task's "Run order"
# section, and run_hil_tests.sh which enforces it): L0 -> L1 -> L2 -> L3 ->
# L4 -> L5 -> L6 -> L8, then L7 (soak) last -- it is the longest test by a
# wide margin and every earlier layer catches its own failure mode faster.
markers =
    l0: Layer 0 - Boot/POST (fully automated)
    l1: Layer 1 - DMX output via ?dmx0 (fully automated, no loopback needed)
    l2: Layer 2 - Art-Net output (fully automated, no instruments)
    l3: Layer 3 - Show load from the raw "show" partition (fully automated)
    l4: Layer 4 - Inputs: Web/OSC fully automated, MIDI semi-automated
    l5: Layer 5 - Fennel REPL / live-coding over WS (fully automated)
    l6: Layer 6 - Safety guarantees: fx_error, infinite loop, OOM (fully automated)
    l7: Layer 7 - Soak: 10 minutes, everything at once (fully automated, run last)
    l8: Layer 8 - F5 robustness: OTA/AP-pull/WDT (mostly skipped -- F5 not yet implemented)
    hardware_dependent: Test requires specific hardware (MIDI injector, a second board, etc.)
    slow: Test takes significant time (the L7 soak test)

# Timeout for individual tests (seconds). L7's soak test overrides this
# per-test via @pytest.mark.timeout (10 minutes + buffer).
timeout = 60

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Logging
log_cli = false
log_cli_level = INFO
log_file = hil_test.log
log_file_level = DEBUG
