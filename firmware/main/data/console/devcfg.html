<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>esp-glow — reconfigure</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Reconfigure page: plain HTML form, not part of the Preact console
       bundle (app.js) -- §6 only asks for "read, edit, write back,
       reboot", and a static form covers that with far less surface than
       wiring a new panel into the cue console's component tree. */
    body { overflow-y: auto; user-select: text; }
    .devcfg-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 16px) 16px 40px;
    }
    .devcfg-wrap h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .devcfg-wrap p.sub {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin: 0 0 20px;
    }
    fieldset {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 16px;
      margin: 0 0 16px;
    }
    legend {
      padding: 0 6px;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin: 10px 0 4px;
    }
    label:first-of-type { margin-top: 0; }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
    }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    .checkbox-row input { width: 20px; height: 20px; }
    .checkbox-row label { margin: 0; color: var(--text); font-size: 0.95rem; }
    .warn-text {
      color: var(--warn);
      font-size: 0.78rem;
      margin: 4px 0 0;
    }
    .actions { display: flex; gap: 10px; margin-top: 8px; }
    button {
      flex: 1;
      min-height: var(--target-min);
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #08101f; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      display: none;
    }
    #status.ok    { display: block; background: rgba(46,204,113,0.12); color: var(--ok); }
    #status.err   { display: block; background: rgba(255,84,112,0.12); color: var(--err); }
    #status.info  { display: block; background: rgba(77,140,255,0.12); color: var(--accent); }
    a.back { color: var(--text-dim); font-size: 0.85rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="devcfg-wrap">
    <p><a class="back" href="/">&larr; back to console</a></p>
    <h1>Device configuration</h1>
    <p class="sub">Reads and writes the on-device CFG1 config (see FORMAT.md). Saving reboots the device to apply it.</p>

    <form id="devcfg-form">
      <fieldset>
        <legend>WiFi</legend>
        <div class="checkbox-row">
          <input type="checkbox" id="skipWifi" />
          <label for="skipWifi">No WiFi (DMX/Fennel only, no network at all)</label>
        </div>
        <label for="wifiSsid">SSID</label>
        <input type="text" id="wifiSsid" maxlength="32" autocomplete="off" />
        <label for="wifiPass">Password</label>
        <input type="password" id="wifiPass" maxlength="64" autocomplete="off" />
      </fieldset>

      <fieldset>
        <legend>Art-Net</legend>
        <label for="artnetFallbackIp">Fallback destination (blank = broadcast)</label>
        <input type="text" id="artnetFallbackIp" placeholder="e.g. 192.168.1.50, or leave blank" />
        <label for="artnetPort">Port</label>
        <input type="number" id="artnetPort" min="1" max="65535" />
      </fieldset>

      <fieldset>
        <legend>Pins (most users never touch these)</legend>
        <div class="row">
          <div>
            <label for="dmxTxGpio">DMX TX GPIO</label>
            <input type="number" id="dmxTxGpio" min="0" max="255" />
          </div>
          <div>
            <label for="dmxRxGpio">DMX RX GPIO</label>
            <input type="number" id="dmxRxGpio" min="0" max="255" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="dmxRtsGpio">DMX RTS GPIO</label>
            <input type="number" id="dmxRtsGpio" min="0" max="255" />
          </div>
          <div>
            <label for="ledGpio">Status LED GPIO</label>
            <input type="number" id="ledGpio" min="0" max="255" />
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>USB-MIDI</legend>
        <div class="checkbox-row">
          <input type="checkbox" id="usbMidiHost" />
          <label for="usbMidiHost">Enable USB-MIDI host</label>
        </div>
        <p class="warn-text">Requires a board with a powered USB-A port (VBUS). Leave off unless your hardware provides it.</p>
      </fieldset>

      <div class="actions">
        <button type="button" id="reload-btn">Reload current</button>
        <button type="submit" class="primary" id="save-btn">Save &amp; reboot</button>
      </div>
    </form>

    <div id="status"></div>
  </div>
  <script type="module" src="devcfg-page.js"></script>
</body>
</html>
